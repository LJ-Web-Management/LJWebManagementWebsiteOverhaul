<!--
  LJ Web / LJ Web Management — Admin dashboard
  ------------------------------------------------
  Static page (safe to host on GitHub Pages) that signs in with Supabase
  Auth and reads the three submission tables. The data itself is protected
  by Postgres Row Level Security, not by this page — RLS only allows
  authenticated reads, so even though this HTML/JS is public, nobody can
  see a row without a valid login. See SETUP.md for how to create your one
  admin login.

  SETUP: fill in SUPABASE_URL and SUPABASE_ANON_KEY below after creating
  your Supabase project.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin | LJ Web Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --adm-primary: #193866;
    --adm-primary-dark: #122a4d;
    --adm-secondary: #a1a1a1;
    --adm-light: #f2f2f3;
    --adm-white: #FFFFFF;
    --adm-text: #212529;
    --adm-muted: rgba(33, 37, 41, 0.7);
    --adm-border: rgba(33, 37, 41, 0.15);
    --adm-glow: rgba(30, 180, 230, 0.28);
    --adm-glow-ring: rgba(30, 180, 230, 0.22);
    --adm-radius: 4px;
    --adm-radius-pill: 999px;
    --adm-font-display: "Sora", sans-serif;
    --adm-font-heading: "Sora", sans-serif;
    --adm-font-body: "Inter", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--adm-font-body);
    color: var(--adm-text);
    background: var(--adm-light);
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: var(--adm-font-heading); font-weight: 500; margin: 0; }

  /* ---------- top bar ---------- */
  .adm-topbar {
    background: var(--adm-primary);
    color: var(--adm-white);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .adm-topbar .adm-brand { font-family: var(--adm-font-display); font-weight: 800; font-size: 15px; letter-spacing: 0.03em; }
  .adm-topbar .adm-brand span { color: rgba(255,255,255,0.55); font-weight: 600; }

  /* ---------- buttons ---------- */
  .adm-btn {
    font-family: var(--adm-font-body);
    font-weight: 600;
    font-size: 14px;
    background: var(--adm-primary);
    color: var(--adm-white);
    border: none;
    border-radius: var(--adm-radius-pill);
    padding: 9px 18px;
    cursor: pointer;
    transition: box-shadow 0.25s ease, transform 0.2s ease;
  }
  .adm-btn:hover:not(:disabled) {
    box-shadow: 0 0 0 4px var(--adm-glow-ring), 0 8px 20px var(--adm-glow);
    transform: translateY(-2px);
  }
  .adm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .adm-btn-ghost {
    background: transparent;
    color: var(--adm-white);
    border: 1px solid rgba(255,255,255,0.4);
  }

  /* ---------- login ---------- */
  .adm-login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .adm-login-card {
    background: var(--adm-white);
    border: 1px solid var(--adm-border);
    border-radius: var(--adm-radius);
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
  }
  .adm-login-card .adm-eyebrow {
    font-family: var(--adm-font-display);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--adm-secondary);
    margin-bottom: 6px;
  }
  .adm-login-card h1 { font-size: 26px; margin-bottom: 22px; }
  .adm-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .adm-field label { font-size: 13px; font-weight: 700; }
  .adm-field input {
    font-family: var(--adm-font-body);
    font-size: 15px;
    padding: 11px 13px;
    border: 1px solid var(--adm-border);
    border-radius: var(--adm-radius);
    background: var(--adm-light);
    outline: none;
    transition: box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .adm-field input:focus {
    background: var(--adm-white);
    border-color: var(--adm-primary);
    box-shadow: 0 0 0 3px var(--adm-glow-ring);
  }
  .adm-login-msg { font-size: 13.5px; font-weight: 600; margin-bottom: 14px; min-height: 18px; }
  .adm-login-msg.is-error { color: #c0392b; }

  /* ---------- dashboard ---------- */
  .adm-main { display: none; padding: 24px; max-width: 1180px; margin: 0 auto; }
  .adm-main.is-active { display: block; }
  .adm-login-wrap.is-hidden { display: none; }

  .adm-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .adm-tab {
    font-family: var(--adm-font-body);
    font-weight: 700;
    font-size: 14px;
    background: var(--adm-white);
    color: var(--adm-text);
    border: 1px solid var(--adm-border);
    border-radius: var(--adm-radius-pill);
    padding: 9px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .adm-tab .adm-count {
    background: var(--adm-light);
    border-radius: var(--adm-radius-pill);
    font-size: 12px;
    padding: 1px 8px;
    color: var(--adm-muted);
  }
  .adm-tab.is-active { background: var(--adm-primary); color: var(--adm-white); border-color: var(--adm-primary); }
  .adm-tab.is-active .adm-count { background: rgba(255,255,255,0.18); color: var(--adm-white); }

  .adm-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .adm-search {
    font-family: var(--adm-font-body);
    font-size: 14px;
    padding: 9px 13px;
    border: 1px solid var(--adm-border);
    border-radius: var(--adm-radius);
    background: var(--adm-white);
    outline: none;
    min-width: 240px;
    flex: 1;
  }
  .adm-search:focus { border-color: var(--adm-primary); box-shadow: 0 0 0 3px var(--adm-glow-ring); }

  .adm-panel { display: none; }
  .adm-panel.is-active { display: block; }

  .adm-table-wrap {
    background: var(--adm-white);
    border: 1px solid var(--adm-border);
    border-radius: var(--adm-radius);
    overflow-x: auto;
  }
  table.adm-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.adm-table th, table.adm-table td {
    text-align: left;
    padding: 11px 14px;
    border-bottom: 1px solid var(--adm-border);
    white-space: nowrap;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  table.adm-table th {
    font-family: var(--adm-font-display);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--adm-secondary);
    background: var(--adm-light);
    position: sticky;
    top: 0;
  }
  table.adm-table tbody tr:hover { background: var(--adm-light); }
  table.adm-table td.adm-cell-wrap { white-space: normal; }
  table.adm-table a { color: var(--adm-primary); }

  .adm-empty, .adm-loading, .adm-error {
    padding: 40px 20px;
    text-align: center;
    color: var(--adm-muted);
    font-size: 14.5px;
  }
  .adm-error { color: #c0392b; }

  @media (max-width: 640px) {
    .adm-main { padding: 16px; }
  }
</style>
</head>
<body>

<div class="adm-login-wrap" id="admLoginWrap">
  <div class="adm-login-card">
    <div class="adm-eyebrow">LJ Web Management</div>
    <h1>Admin Sign In</h1>
    <form id="admLoginForm" novalidate>
      <div class="adm-field">
        <label for="admEmail">Email</label>
        <input type="email" id="admEmail" autocomplete="username" required />
      </div>
      <div class="adm-field">
        <label for="admPassword">Password</label>
        <input type="password" id="admPassword" autocomplete="current-password" required />
      </div>
      <div class="adm-login-msg" id="admLoginMsg"></div>
      <button type="submit" class="adm-btn" id="admLoginBtn" style="width:100%;">Sign In</button>
    </form>
  </div>
</div>

<div class="adm-main" id="admMain">
  <div class="adm-topbar">
    <div class="adm-brand">LJ WEB MANAGEMENT <span>/ ADMIN</span></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="admUserEmail" style="font-size:13px; color:rgba(255,255,255,0.75);"></span>
      <button class="adm-btn adm-btn-ghost" id="admSignOutBtn">Sign Out</button>
    </div>
  </div>

  <div style="padding: 24px;">
    <div class="adm-tabs">
      <button class="adm-tab is-active" data-panel="contact">Contact Us <span class="adm-count" id="admCountContact">–</span></button>
      <button class="adm-tab" data-panel="leads">Product Leads <span class="adm-count" id="admCountLeads">–</span></button>
      <button class="adm-tab" data-panel="appointments">Appointments <span class="adm-count" id="admCountAppointments">–</span></button>
    </div>

    <div class="adm-toolbar">
      <input type="search" class="adm-search" id="admSearch" placeholder="Search this table…" />
      <button class="adm-btn adm-btn-ghost" id="admRefreshBtn" style="background:var(--adm-white); color:var(--adm-text); border:1px solid var(--adm-border);">Refresh</button>
    </div>

    <!-- Contact Us -->
    <div class="adm-panel is-active" data-panel="contact">
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr>
            <th>Received</th><th>Name</th><th>Email</th><th>Phone</th><th>Subject</th><th>Message</th>
          </tr></thead>
          <tbody id="admContactBody"></tbody>
        </table>
        <div class="adm-loading" id="admContactStatus">Loading…</div>
      </div>
    </div>

    <!-- Product Leads -->
    <div class="adm-panel" data-panel="leads">
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr>
            <th>Received</th><th>Name</th><th>Email</th><th>Phone</th><th>Product</th><th>Page</th>
          </tr></thead>
          <tbody id="admLeadsBody"></tbody>
        </table>
        <div class="adm-loading" id="admLeadsStatus">Loading…</div>
      </div>
    </div>

    <!-- Appointments -->
    <div class="adm-panel" data-panel="appointments">
      <div class="adm-table-wrap">
        <table class="adm-table">
          <thead><tr>
            <th>Booked</th><th>Meeting</th><th>When (CT)</th><th>Name</th><th>Email</th><th>Phone</th><th>Notes</th>
          </tr></thead>
          <tbody id="admAppointmentsBody"></tbody>
        </table>
        <div class="adm-loading" id="admAppointmentsStatus">Loading…</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // SETUP: fill these in after creating your Supabase project (see SETUP.md
  // → "Get your project keys"). The anon key is safe to expose publicly —
  // it can only do what your Row Level Security policies allow, which for
  // these tables is "read nothing unless signed in."
  const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR-ANON-KEY";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginWrap = document.getElementById("admLoginWrap");
  const mainEl = document.getElementById("admMain");
  const loginForm = document.getElementById("admLoginForm");
  const loginMsg = document.getElementById("admLoginMsg");
  const loginBtn = document.getElementById("admLoginBtn");
  const userEmailEl = document.getElementById("admUserEmail");

  function showDashboard(session) {
    loginWrap.classList.add("is-hidden");
    mainEl.classList.add("is-active");
    userEmailEl.textContent = session.user.email;
    loadAllTables();
  }

  function showLogin() {
    loginWrap.classList.remove("is-hidden");
    mainEl.classList.remove("is-active");
  }

  supabase.auth.getSession().then(({ data }) => {
    if (data.session) showDashboard(data.session);
  });

  supabase.auth.onAuthStateChange((_event, session) => {
    if (session) showDashboard(session); else showLogin();
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginMsg.textContent = "";
    loginMsg.classList.remove("is-error");
    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in…";

    const email = document.getElementById("admEmail").value.trim();
    const password = document.getElementById("admPassword").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    loginBtn.disabled = false;
    loginBtn.textContent = "Sign In";

    if (error) {
      loginMsg.textContent = error.message || "Sign in failed.";
      loginMsg.classList.add("is-error");
    }
  });

  document.getElementById("admSignOutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
  });

  /* ---------------- tabs ---------------- */
  const tabs = Array.from(document.querySelectorAll(".adm-tab"));
  const panels = Array.from(document.querySelectorAll(".adm-panel"));
  const searchInput = document.getElementById("admSearch");

  tabs.forEach((tab) => {
    tab.addEventListener("click", () => {
      tabs.forEach((t) => t.classList.toggle("is-active", t === tab));
      panels.forEach((p) => p.classList.toggle("is-active", p.getAttribute("data-panel") === tab.getAttribute("data-panel")));
      searchInput.value = "";
      applySearch();
    });
  });

  searchInput.addEventListener("input", applySearch);

  function applySearch() {
    const activePanel = document.querySelector(".adm-panel.is-active");
    const query = searchInput.value.trim().toLowerCase();
    const rows = activePanel.querySelectorAll("tbody tr");
    rows.forEach((row) => {
      const text = row.textContent.toLowerCase();
      row.style.display = !query || text.indexOf(query) !== -1 ? "" : "none";
    });
  }

  document.getElementById("admRefreshBtn").addEventListener("click", loadAllTables);

  /* ---------------- data loading ---------------- */
  function escapeHtml(v) {
    return String(v == null ? "" : v)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "–";
    const d = new Date(iso);
    return d.toLocaleString(undefined, { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  }

  async function loadAllTables() {
    loadContact();
    loadLeads();
    loadAppointments();
  }

  async function loadContact() {
    const status = document.getElementById("admContactStatus");
    const body = document.getElementById("admContactBody");
    status.style.display = "block";
    status.className = "adm-loading";
    status.textContent = "Loading…";
    body.innerHTML = "";

    const { data, error } = await supabase
      .from("contact_submissions")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      status.className = "adm-error";
      status.textContent = "Could not load contact submissions: " + error.message;
      document.getElementById("admCountContact").textContent = "–";
      return;
    }

    document.getElementById("admCountContact").textContent = data.length;

    if (!data.length) {
      status.className = "adm-empty";
      status.textContent = "No contact submissions yet.";
      return;
    }
    status.style.display = "none";

    body.innerHTML = data.map((r) => `
      <tr>
        <td>${fmtDate(r.created_at)}</td>
        <td>${escapeHtml(r.name)}</td>
        <td><a href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a></td>
        <td>${escapeHtml(r.phone || "–")}</td>
        <td>${escapeHtml(r.subject)}</td>
        <td class="adm-cell-wrap">${escapeHtml(r.message)}</td>
      </tr>
    `).join("");
    applySearch();
  }

  async function loadLeads() {
    const status = document.getElementById("admLeadsStatus");
    const body = document.getElementById("admLeadsBody");
    status.style.display = "block";
    status.className = "adm-loading";
    status.textContent = "Loading…";
    body.innerHTML = "";

    const { data, error } = await supabase
      .from("product_leads")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      status.className = "adm-error";
      status.textContent = "Could not load product leads: " + error.message;
      document.getElementById("admCountLeads").textContent = "–";
      return;
    }

    document.getElementById("admCountLeads").textContent = data.length;

    if (!data.length) {
      status.className = "adm-empty";
      status.textContent = "No product page leads yet.";
      return;
    }
    status.style.display = "none";

    body.innerHTML = data.map((r) => `
      <tr>
        <td>${fmtDate(r.created_at)}</td>
        <td>${escapeHtml(r.name)}</td>
        <td><a href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a></td>
        <td>${escapeHtml(r.phone || "–")}</td>
        <td>${escapeHtml(r.product || "–")}</td>
        <td><a href="${escapeHtml(r.page_url)}" target="_blank" rel="noopener">${escapeHtml(r.page_url)}</a></td>
      </tr>
    `).join("");
    applySearch();
  }

  async function loadAppointments() {
    const status = document.getElementById("admAppointmentsStatus");
    const body = document.getElementById("admAppointmentsBody");
    status.style.display = "block";
    status.className = "adm-loading";
    status.textContent = "Loading…";
    body.innerHTML = "";

    const { data, error } = await supabase
      .from("appointments")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      status.className = "adm-error";
      status.textContent = "Could not load appointments: " + error.message;
      document.getElementById("admCountAppointments").textContent = "–";
      return;
    }

    document.getElementById("admCountAppointments").textContent = data.length;

    if (!data.length) {
      status.className = "adm-empty";
      status.textContent = "No appointments booked yet.";
      return;
    }
    status.style.display = "none";

    body.innerHTML = data.map((r) => `
      <tr>
        <td>${fmtDate(r.created_at)}</td>
        <td>${escapeHtml(r.appointment_label)} (${r.duration_minutes} min)</td>
        <td>${escapeHtml(r.appointment_date)} ${escapeHtml(r.appointment_time_label)}</td>
        <td>${escapeHtml(r.name)}</td>
        <td><a href="mailto:${escapeHtml(r.email)}">${escapeHtml(r.email)}</a></td>
        <td>${escapeHtml(r.phone || "–")}</td>
        <td class="adm-cell-wrap">${escapeHtml(r.notes || "–")}</td>
      </tr>
    `).join("");
    applySearch();
  }
</script>
</body>
</html>
