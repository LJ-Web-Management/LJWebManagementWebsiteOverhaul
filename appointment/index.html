<!--
  LJ Web Management, Appointment Booking Page
  ------------------------------------------------
  Scheduling is handled entirely by Calendly (https://calendly.com/ljweb/appointment).
  This page is just the LJ-branded header wrapped around Calendly's inline
  embed widget: availability, confirmation emails, rescheduling, and
  timezone handling are all Calendly's, not ours.

  To change the Calendly link, update the data-url on the
  .calendly-inline-widget div below.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Book a free consultation with LJ Web Management to scope out custom AI automation for your business, done in minutes through our online scheduler." />

<meta property="og:type" content="website" />
<meta property="og:title" content="Book an Appointment | LJ Web Management" />
<meta property="og:site_name" content="LJ Web Management" />
<meta property="og:url" content="https://ljwebmanagement.com/appointment" />
<meta property="og:image" content="https://ljwebmanagement.com/assets/social-share.png" />
<meta property="og:description" content="Book a free consultation with LJ Web Management to scope out custom AI automation for your business, done in minutes through our online scheduler." />

<meta name="twitter:card" content="summary_large_image" />

<link rel="canonical" href="https://ljwebmanagement.com/appointment" />

<link rel="apple-touch-icon" href="../assets/favicon.ico" />
<title>Book an Appointment | LJ Web Management</title>
<link type="image/x-icon" rel="shortcut icon" href="../assets/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="preconnect" href="https://assets.calendly.com" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #16202e;
    background: #ffffff;
    -webkit-font-smoothing: antialiased;
  }
  .ljb-page { max-width: 960px; margin: 0 auto; padding: 28px 16px 48px; }

  .ljb-logo { display: flex; justify-content: center; margin-bottom: 24px; }
  .ljb-logo img { height: 40px; width: auto; }

  .ljb-head { text-align: center; padding: 8px 12px 32px; }
  .ljb-eyebrow {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1EB4E6;
    margin-bottom: 10px;
  }
  .ljb-head h1 {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 4vw, 36px);
    line-height: 1.15;
    margin: 0 0 12px;
    color: #193866;
  }
  .ljb-head p {
    color: #6b7280;
    font-size: 15.5px;
    line-height: 1.6;
    margin: 0 auto;
    max-width: 480px;
  }

  .calendly-inline-widget { min-width: 320px; height: 700px; }

  .ljb-foot {
    text-align: center;
    margin-top: 28px;
    font-size: 14px;
    color: #6b7280;
  }
  .ljb-foot a { color: #193866; font-weight: 600; text-decoration: none; }
  .ljb-foot a:hover { color: #1EB4E6; }

  @media (max-width: 480px) {
    .ljb-head h1 { font-size: 26px; }
    .calendly-inline-widget { height: 780px; }
  }
</style>
</head>
<body>

<div class="ljb-page">
  <a class="ljb-logo" href="../">
    <img src="../assets/lj-logo.webp" alt="LJ Web Management" width="320" height="321" />
  </a>

  <div class="ljb-head">
    <div class="ljb-eyebrow">Book a Consultation</div>
    <h1>Let's Find a Time to Talk</h1>
    <p>Pick a slot that works for you, no back-and-forth required. We'll show up ready to talk through what's slowing your business down.</p>
  </div>

  <div class="calendly-inline-widget" data-url="https://calendly.com/ljweb/appointment"></div>

  <p class="ljb-foot">Prefer email? <a href="../contactus">Contact us instead</a>.</p>
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</body>
</html>
